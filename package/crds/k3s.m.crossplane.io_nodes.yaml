              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A NodeSpec defines the desired state of a Node.
            properties:
              forProvider:
                description: NodeParameters are the configurable fields of a Node.
                properties:
                  clusterRef:
                    description: ClusterRef is a reference to the Cluster resource
                      this node joins.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
